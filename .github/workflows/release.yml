name: Release

on:
  push:
    branches: [master]

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version & publish (@medusa-cz/*)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      # Scope the secret to this tiny check step only — export just a boolean so
      # NPM_TOKEN is never in the environment when `pnpm install` runs lifecycle
      # scripts (supply-chain hardening).
      - name: Check NPM_TOKEN
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Skip release (NPM_TOKEN not configured)
        if: steps.token.outputs.present == 'false'
        run: echo "NPM_TOKEN not set — release workflow is inert until the @medusa-cz scope token is configured. Skipping."
      - name: Create release PR or publish
        if: steps.token.outputs.present == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
# Inert until repo secret NPM_TOKEN (publish rights to the @medusa-cz scope) is set.
# Once set: changesets/action opens a "Version Packages" PR when changesets exist;
# merging that PR publishes. With no token the job is a green no-op (no failed runs).
# The secret is confined to the check step and the publish step — never present
# during dependency install.
